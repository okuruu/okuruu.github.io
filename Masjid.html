    <form name="submit-to-google-sheet" >
    <div class="main-content">
    
            <div class="row shadow">
                  <div class="col-12">
                    <div class="card">
                        <center><img src="https://deabakery.com/wp-content/uploads/2016/11/logo-baru.png" class="mb-3" /></center>
                        <h4 class="text-center">FORM DATA <br> BERBAGI 50.000 ROTI KE 1.000 MASJID</h4>
    
                      <div class="card-body">
                      
                      <div class="row">
                          <div class="col-12">
    
                            <div class="form-group">
                                <label>Nama Anda</label><br>
                                <input type="text" name="namaPengaju" class="form-control mb-2" placeholder="Cth: Salih Abdullah">
                            </div>

                            <div class="form-group">
                                <label>No. HP/WhatsApp</label>
                                <input type="number" name="noPengaju" class="form-control mb-2" placeholder="No. HP/WhatsApp Anda">
                            </div>

                            <div class="form-group">
                                <label>Nama masjid</label>
                                <input type="text" name="namaMasjid" class="form-control mb-2" placeholder="Cth: Al - Muhajirin">
                            </div>

                            <div class="form-group">
                                <label>Alamat masjid yang diajukan</label>
                                <input type="text" name="alamatMasjid" class="form-control mb-2" placeholder="Cth: Jl. Telaga Murni No.42E">
                            </div>

                            <div class="form-group">
                                <label>Nama kecamatan masjid</label>
                                <input type="text" name="kecamatanMasjid" class="form-control mb-2" placeholder="Cth: Purwodadi">
                            </div>

                            <div class="form-group">
                                <label>Nama kelurahan masjid</label>
                                <input type="text" name="kelurahanMasjid" class="form-control mb-2" placeholder="Cth: Blimbing">
                            </div>

                            <div class="form-group">
                                <label>Outlet pengambilan terdekat</label>
                                <select name="outletTerdekat" class="form-control">
                                    <option value="">Pilih Outlet</option>
                                    <option value="Bandulan">Bandulan - Jl. Raya Bandulan 34 Kav. 3, Malang (timur Alfamidi Bandulan) </option>
                                    <option value="Blitar">Blitar - Jl. Veteran 5 (selatan Bank BRI, Blitar)</option>
                                    <option value="Batu">Batu - BTC (Batu Tourism Center) Jl. Kartini - Batu,</option>
                                    <option value="Dinoyo">Dinoyo - Jl. MT Haryono 174 (depan Prima Rasa Dinoyo)</option>
                                    <option value="Dampit">Dampit - Jl. Semeru Selatan 4, Dampit</option>
                                    <option value="Gondanglegi">Gondanglegi - Jl. Gajahmada 17 Gondanglegi</option>
                                    <option value="Kepanjen">Kepanjen - Jl. Banurejo (utara Pasar Kepanjen)</option>
                                    <option value="Ketawang">Ketawang - Jl. P. Sudirman 10 Ketawang (utara R.S. Wafa Husada)</option>
                                    <option value="Kawi">Kawi - Jl. Kawi Atas No.30, Gading Kasri, Kec. Klojen, Kota Malang, Jawa Timur 65125, </option>
                                    <option value="Ngunut">Ngunut - Jl. Demuk 52 (utara SDN 6 Ngunut, Tulungagung)</option>
                                    <option value="Probolinggo">Probolinggo - Jl. Dr. Sutomo 103 (depan Puk ami ami, Probolinggo)</option>
                                    <option value="Pandaan">Pandaan - Jl Kartini 13B Pandaan </option>
                                    <option value="Pujon">Pujon - Jl. Brigjen Abdul Manan Wijaya 317 C Pujon</option>
                                    <option value="Pakisaji">Pakisaji - Jl. Raya Pakisaji 236 (depan Pasar Pakisaji) </option>
                                    <option value="Pakis">Pakis - Ruko Pakis Megah Kav. 4 Jl. Raya Pakis Kembar, Pakis</option>
                                    <option value="Pasuruan" >Pasuruan - Jl. Diponegoro 3C (selatan PLN, Pasuruan)</option>
                                    <option value="Payakumbuh">Payakumbuh - Jl. Soekarno Hatta No.68, Parik Rantang, Kec. Payakumbuh Bar., Kota Payakumbuh, Sumatra Barat 26219,</option>
                                    <option value="Rungkut">Rungkut - Jl. Rungkut Madya No.123, Rungkut Kidul, Surabaya</option>
                                    <option value="Singosari">Singosari - Jl.Tumapel (Ruko Tumapel 4 Singosari)</option>
                                    <option value="Sukun">Sukun - Jl. S. Supriyadi 56 B / 17 (depan Pasar Sukun)</option>
                                    <option value="Sawojajar">Sawojajar - Ruko Sawojajar Jl. Danau Toba E-07</option>
                                    <option value="Tumpang">Tumpang - Jl. Raya Tumpang (depan Pasar Tumpang)</option>
                                    <option value="Turen" >Turen - Jl. P. Sudirman 75 Sentral Niaga Turen (depan BRI Syariah)</option>
                                    <option value="Kapas Krampung">Kapas Krampung - Jalan Kapas Krampung No. 67 Kav 2 Rangkah Surabaya,</option>>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Nama takmir masjid</label>
                                <input type="text" name="namaTakmir" class="form-control mb-2" placeholder="Cth: Ibrohim Fajar">
                            </div>

                            <div class="form-group">
                                <label>No. HP/WhatsApp Takmir</label>
                                <input type="text" name="hpTakmir" class="form-control mb-2" placeholder="No. HP/WhatsApp Takmir">
                            </div>
    
    
                          <div class="col-xs-12">
                              <div class="text-right">
                                <input type="submit" name="submit" value="Selesai" class="form-control btn-danger btn-kirim">
                                
                                <button class="form-control btn-primary btn-progress btn-loading d-none" type="button" disabled>
                                    Loading...
                                  </button>
    
                              </div>
                            </div>
                              
                              <br>
    
                            <div class="alert alert-success alert-dismissible show fade d-none my-alert mt-1">
                              <div class="alert-body">
                                <button class="close" data-dismiss="alert">
                                  <span>&times;</span>
                                </button>
                                Terimakasih! Data anda sudah kami terima!
                              </div>
                            </div>  
    
                        </div>               
    
                      </div>
                    </div>
                  </div>
                </div>               
    
            </div>
    
          </form>
            
          <script>
            const scriptURL = 'https://script.google.com/macros/s/AKfycbzlyyrOX2Dp5CLckvKYs6lFmfaJCY24F4QR2kS_KGIj-ldZOMFU/exec'
            const form = document.forms['submit-to-google-sheet']
    
            const btnKirim = document.querySelector('.btn-kirim');
            const btnLoading = document.querySelector('.btn-loading');
            const myAlert = document.querySelector('.my-alert');
          
            form.addEventListener('submit', e => {
              e.preventDefault()
              // tombol sambi ilang
              btnLoading.classList.toggle('d-none');
              btnKirim.classList.toggle('d-none');
    
              // Ketika tombol diklik tombol sapmit kwk
              fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    btnLoading.classList.toggle('d-none');
                    btnKirim.classList.toggle('d-none');    
                    myAlert.classList.toggle('d-none');
                    form.reset();
                })
                .catch(error => console.error('Error!', error.message))
            })
          </script>
    
            <!-- General JS Scripts -->
          <script src="https://getstisla.com/dist/modules/jquery.min.js"></script>
          <script src="https://getstisla.com/dist/modules/bootstrap/js/bootstrap.min.js"></script>
          <script src="https://getstisla.com/dist/modules/nicescroll/jquery.nicescroll.min.js"></script>
