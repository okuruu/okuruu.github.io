<html>
<head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Survey Form - Dea University</title>
  <!-- General CSS Files -->
  <link rel="stylesheet" href="https://getstisla.com/dist/modules/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://getstisla.com/dist/modules/fontawesome/css/all.min.css">

  <!-- CSS Libraries -->

  <!-- Template CSS -->
  <link rel="stylesheet" href="https://getstisla.com/dist/css/style.css">
  <link rel="stylesheet" href="https://getstisla.com/dist/css/components.css">

</head>

<form name="submit-to-google-sheet">

<div class="main-content">

        <div class="row">
              <div class="col-12">
                <div class="card">
                    <center><img src="https://okuruu.github.io/logo_university.png" width="200" height="200" /></center>
                  <div class="card-header">
                      
                    <h4>Survey Form - Dea University</h4>
                  </div>
                  <div class="card-body">
                  
                  <div class="row">
                      <div class="col-12">

                        <div class="form-group">
                          <label>Email Anda</label>
                          <input name="email" type="email" class="form-control" required>
                        </div>

                        <!-- Nomor A1 -->
                        <table class="table table-bordered table-md text-center">

                            <th class="img-fluid" data-toggle="modal" data-target="#A1">A1. Pemahaman saya atas materi training ini </th>
                            <tr>
                                <td class="text-center">
                                    <input type="range" class="form-control" min="0" max="6" id="customRange2" onchange="updateTextInputA1(this.value);">
                                    <input type="text" name="A1A" id="textInputA1" value="3" class="form-control" readonly>
                            </td>
                            </tr>
                        </table>

                            <!-- Nomor A2 -->
                            <table class="table table-bordered table-md text-center">

                            <th class="img-fluid" data-toggle="modal" data-target="#A2">A2. Materi sesuai dengan kebutuhan?</th>
                            <tr>
                                <td class="text-center">
                                    <input type="range" class="form-control" min="0" max="6" id="customRange2" onchange="updateTextInputA2(this.value);">
                                    <input type="text" name="A2A" id="textInputA2" value="3" class="form-control" readonly> 
                            </td>
                            </tr>
                        </table>    

                            <!-- Nomor A3 -->
                            <table class="table table-bordered table-md text-center">

                            <th class="img-fluid" data-toggle="modal" data-target="#A3">A3. Metode ini membantu dalam proses belajar ?</th>
                            <tr>
                                <td class="text-center">
                                    <input type="range" class="form-control" min="0" max="6" id="customRange2" onchange="updateTextInputA3(this.value);">
                                    <input type="text" name="A3A" id="textInputA3" value="3" class="form-control" readonly> 
                            </td>
                            </tr>
                        </table>  

                        <div class="form-group">
                          <label>Saran metode teknis kelas BBP Dea University?</label>
                          <input name="pertanyaan1" type="text" required class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Saran materi yang perlu dibahas (di luar kurikulum yang sudah ada)?</label>
                            <input name="pertanyaan2" type="text" required class="form-control">
                          </div>                        


                      <div class="col-xs-12">
                          <div class="text-right">
                            <input type="submit" name="submit" value="Selesai" class="btn btn-primary btn-kirim">
                            
                            <button class="btn btn-primary btn-progress btn-loading d-none" type="button" disabled>
                                Loading...
                              </button>

                          </div>
                        </div>

                    </div>               

                  </div>
                </div>
              </div>
            </div>

            <div class="alert alert-success alert-dismissible show fade d-none my-alert">
                <div class="alert-body">
                  <button class="close" data-dismiss="alert">
                    <span>&times;</span>
                  </button>
                  Terimakasih! Data anda sudah kami terima!
                </div>
              </div>                 

        </div>

      </form>
      
      <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwliVF37skLkSdVMMn0ApLTivk4UZ9ytChkWbXXePG-uGy--xc/exec'
        const form = document.forms['submit-to-google-sheet']

        const btnKirim = document.querySelector('.btn-kirim');
        const btnLoading = document.querySelector('.btn-loading');
        const myAlert = document.querySelector('.my-alert');
      
        form.addEventListener('submit', e => {
          e.preventDefault()
          // tombol sambi ilang
          btnLoading.classList.toggle('d-none');
          btnKirim.classList.toggle('d-none');

          // Ketika tombol diklik tombol sapmit kwk
          fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                // Tampilin tombol kirim ilangin loding
                btnLoading.classList.toggle('d-none');
                btnKirim.classList.toggle('d-none');    
                // tampilin alert
                myAlert.classList.toggle('d-none');
                // reset formmmm
                form.reset();            
            })
            .catch(error => console.error('Error!', error.message))
        })
      </script>

      <script>

        function updateTextInputA1(val) {
          document.getElementById('textInputA1').value=val; 
        }

        function updateTextInputA2(val) {
          document.getElementById('textInputA2').value=val; 
        }

        function updateTextInputA3(val) {
          document.getElementById('textInputA3').value=val; 
        }

      </script>

        <!-- General JS Scripts -->
      <script src="https://getstisla.com/dist/modules/jquery.min.js"></script>
      <script src="https://getstisla.com/dist/modules/bootstrap/js/bootstrap.min.js"></script>
      <script src="https://getstisla.com/dist/modules/nicescroll/jquery.nicescroll.min.js"></script>
      <script src="https://getstisla.com/dist/modules/moment.min.js"></script>
      <script src="https://getstisla.com/dist/js/stisla.js"></script>
      
      <!-- JS Libraies -->
    
      <!-- Page Specific JS File -->
      
      <!-- Template JS File -->
      <script src="https://getstisla.com/dist/js/scripts.js"></script>
      <script src="https://getstisla.com/dist/js/custom.js"></script>
    
    </body>

</html>
